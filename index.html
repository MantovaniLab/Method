    <script type="text/babel">
      const cx = (...xs) => xs.filter(Boolean).join(" ");

      function useScrollSpy(sectionIds, offsetPx = 96) {
        const [active, setActive] = React.useState(sectionIds[0] || "");
        React.useEffect(() => {
          const handler = () => {
            const y = window.scrollY + offsetPx;
            let current = sectionIds[0] || "";
            for (const id of sectionIds) {
              const el = document.getElementById(id);
              if (!el) continue;
              const top = el.offsetTop;
              if (top <= y) current = id;
            }
            setActive(current);
          };
          handler();
          window.addEventListener("scroll", handler, { passive: true });
          return () => window.removeEventListener("scroll", handler);
        }, [sectionIds.join("|"), offsetPx]);
        return active;
      }

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const y = el.getBoundingClientRect().top + window.scrollY - 84; // header offset
        window.scrollTo({ top: y, behavior: "smooth" });
      }

      const Section = ({ id, eyebrow, title, children, className }) => (
        <section id={id} className={cx("py-16 sm:py-20", className)}>
          <div className="mx-auto max-w-6xl px-5">
            {eyebrow && (
              <div className="text-xs font-semibold tracking-[0.18em] uppercase text-slate-500">
                {eyebrow}
              </div>
            )}
            {title && (
              <h2 className="mt-2 text-2xl sm:text-3xl font-semibold tracking-tight text-slate-900">
                {title}
              </h2>
            )}
            <div className="mt-6">{children}</div>
          </div>
        </section>
      );

      const Card = ({ children, className }) => (
        <div className={cx("rounded-2xl border border-slate-200 bg-white p-6 shadow-sm", className)}>
          {children}
        </div>
      );

      const Pill = ({ children }) => (
        <span className="inline-flex items-center rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-medium text-slate-700">
          {children}
        </span>
      );

      const NavLink = ({ id, label, activeId }) => (
        <button
          onClick={() => scrollToId(id)}
          className={cx(
            "text-sm font-medium transition-colors",
            activeId === id ? "text-slate-900" : "text-slate-500 hover:text-slate-800"
          )}
        >
          {label}
        </button>
      );

      const eurFmt = new Intl.NumberFormat("it-IT", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0,
      });

      function toNum(v, fallback = 0) {
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
      }

      function runRiskModel({ contractValue, durationMonths, annualFrequencyPct, severityPct, capPct, volatilityPct }) {
        const value = Math.max(0, toNum(contractValue));
        const months = Math.max(0, toNum(durationMonths));
        const freqPct = Math.max(0, toNum(annualFrequencyPct));
        const sevPct = Math.max(0, toNum(severityPct));
        const cap = Math.max(0, toNum(capPct));
        const vol = Math.max(0, toNum(volatilityPct));

        const termYears = months / 12;
        const lambda = (freqPct / 100) * termYears; // expected events over contract term
        const eventLoss = Math.min(value * (sevPct / 100), value * (cap / 100));

        const expectedLoss = lambda * eventLoss;
        const p95Events = lambda + 1.64 * Math.sqrt(lambda + 0.2);
        const p95Severity = eventLoss * (1 + (vol / 100) * 1.64);
        const stressP95 = p95Events * p95Severity;

        return {
          expectedLoss,
          stressP95,
          eventLoss,
          lambda,
        };
      }

      const NumberInput = ({ label, value, onChange, step = "1", suffix }) => (
        <label className="block">
          <div className="mb-1 text-xs font-semibold uppercase tracking-wider text-slate-500">{label}</div>
          <div className="relative">
            <input
              type="number"
              value={value}
              step={step}
              onChange={(e) => onChange(e.target.value)}
              className="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900 outline-none focus:border-slate-500"
            />
            {suffix && <span className="pointer-events-none absolute right-3 top-2 text-sm text-slate-500">{suffix}</span>}
          </div>
        </label>
      );

      function PricingDemo() {
        const [inputs, setInputs] = React.useState({
          contractValue: "1200000",
          durationMonths: "36",
          capPct: "100",
          volatilityPct: "35",
          baselineFrequencyPct: "12",
          baselineSeverityPct: "18",
          modifiedFrequencyPct: "18",
          modifiedSeverityPct: "24",
        });

        const onField = (key, value) => {
          setInputs((prev) => ({ ...prev, [key]: value }));
        };

        const baseline = React.useMemo(() => runRiskModel({
          contractValue: inputs.contractValue,
          durationMonths: inputs.durationMonths,
          annualFrequencyPct: inputs.baselineFrequencyPct,
          severityPct: inputs.baselineSeverityPct,
          capPct: inputs.capPct,
          volatilityPct: inputs.volatilityPct,
        }), [inputs]);

        const modified = React.useMemo(() => runRiskModel({
          contractValue: inputs.contractValue,
          durationMonths: inputs.durationMonths,
          annualFrequencyPct: inputs.modifiedFrequencyPct,
          severityPct: inputs.modifiedSeverityPct,
          capPct: inputs.capPct,
          volatilityPct: inputs.volatilityPct,
        }), [inputs]);

        const deltaExpected = modified.expectedLoss - baseline.expectedLoss;
        const deltaStress = modified.stressP95 - baseline.stressP95;
        const deltaEventLoss = modified.eventLoss - baseline.eventLoss;
        const contractValue = Math.max(1, toNum(inputs.contractValue, 1));
        const deltaPct = (deltaExpected / contractValue) * 100;

        return (
          <Section
            id="demo"
            eyebrow="Live Demo"
            title="Clause Change Pricing Demo"
            className="bg-slate-50 border-y border-slate-200"
          >
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
              <div className="lg:col-span-7">
                <Card className="bg-white">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div className="space-y-3">
                      <div className="text-sm font-semibold text-slate-900">Contract parameters</div>
                      <NumberInput label="Contract value" value={inputs.contractValue} onChange={(v) => onField("contractValue", v)} />
                      <NumberInput label="Duration" value={inputs.durationMonths} onChange={(v) => onField("durationMonths", v)} suffix="months" />
                      <NumberInput label="Liability cap" value={inputs.capPct} onChange={(v) => onField("capPct", v)} step="0.1" suffix="%" />
                      <NumberInput label="Severity volatility" value={inputs.volatilityPct} onChange={(v) => onField("volatilityPct", v)} step="0.1" suffix="%" />
                    </div>
                    <div className="space-y-3">
                      <div className="text-sm font-semibold text-slate-900">Baseline clause</div>
                      <NumberInput label="Annual frequency" value={inputs.baselineFrequencyPct} onChange={(v) => onField("baselineFrequencyPct", v)} step="0.1" suffix="%" />
                      <NumberInput label="Severity per event" value={inputs.baselineSeverityPct} onChange={(v) => onField("baselineSeverityPct", v)} step="0.1" suffix="%" />
                      <div className="pt-2 text-sm font-semibold text-slate-900">Requested amendment</div>
                      <NumberInput label="Annual frequency" value={inputs.modifiedFrequencyPct} onChange={(v) => onField("modifiedFrequencyPct", v)} step="0.1" suffix="%" />
                      <NumberInput label="Severity per event" value={inputs.modifiedSeverityPct} onChange={(v) => onField("modifiedSeverityPct", v)} step="0.1" suffix="%" />
                    </div>
                  </div>
                </Card>
              </div>

              <div className="lg:col-span-5 space-y-5">
                <Card className="bg-white">
                  <div className="text-sm font-semibold text-slate-900">Baseline vs amendment</div>
                  <div className="mt-4 space-y-3 text-sm">
                    <div className="flex items-center justify-between gap-4">
                      <span className="text-slate-600">Expected loss (baseline)</span>
                      <span className="font-semibold">{eurFmt.format(baseline.expectedLoss)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4">
                      <span className="text-slate-600">Expected loss (amendment)</span>
                      <span className="font-semibold">{eurFmt.format(modified.expectedLoss)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4">
                      <span className="text-slate-600">Stress P95 (baseline)</span>
                      <span className="font-semibold">{eurFmt.format(baseline.stressP95)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4">
                      <span className="text-slate-600">Stress P95 (amendment)</span>
                      <span className="font-semibold">{eurFmt.format(modified.stressP95)}</span>
                    </div>
                  </div>
                </Card>

                <Card className={cx("border-2", deltaExpected >= 0 ? "border-rose-300 bg-rose-50" : "border-emerald-300 bg-emerald-50")}>
                  <div className="text-xs font-semibold uppercase tracking-wider text-slate-600">Incremental clause cost</div>
                  <div className="mt-2 text-2xl font-semibold text-slate-900">{eurFmt.format(deltaExpected)}</div>
                  <div className="mt-1 text-sm text-slate-700">Expected loss delta ({deltaPct.toFixed(2)}% of contract value)</div>
                  <div className="mt-4 space-y-1 text-sm text-slate-700">
                    <div>Stress delta P95: <span className="font-semibold">{eurFmt.format(deltaStress)}</span></div>
                    <div>Per-event loss delta: <span className="font-semibold">{eurFmt.format(deltaEventLoss)}</span></div>
                  </div>
                </Card>
              </div>
            </div>
          </Section>
        );
      }
