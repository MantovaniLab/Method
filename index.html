<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantovani — Structured Legal Engineering</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      :root { color-scheme: light; }
      body { font-family: "Inter", sans-serif; }
      .prose-tight p { margin-top: 0.5rem; margin-bottom: 0.5rem; }
    </style>
  </head>

  <body class="bg-white text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
      const cx = (...xs) => xs.filter(Boolean).join(" ");

      function useScrollSpy(sectionIds, offsetPx = 96) {
        const [active, setActive] = React.useState(sectionIds[0] || "");
        React.useEffect(() => {
          const handler = () => {
            const y = window.scrollY + offsetPx;
            let current = sectionIds[0] || "";
            for (const id of sectionIds) {
              const el = document.getElementById(id);
              if (!el) continue;
              const top = el.offsetTop;
              if (top <= y) current = id;
            }
            setActive(current);
          };
          handler();
          window.addEventListener("scroll", handler, { passive: true });
          return () => window.removeEventListener("scroll", handler);
        }, [sectionIds.join("|"), offsetPx]);
        return active;
      }

      function scrollToId(id) {
        const el = document.getElementById(id);
        if (!el) return;
        const y = el.getBoundingClientRect().top + window.scrollY - 84; // header offset
        window.scrollTo({ top: y, behavior: "smooth" });
      }

      const Section = ({ id, eyebrow, title, children, className }) => (
        <section id={id} className={cx("py-16 sm:py-20", className)}>
          <div className="mx-auto max-w-6xl px-5">
            {eyebrow && (
              <div className="text-xs font-semibold tracking-[0.18em] uppercase text-slate-500">
                {eyebrow}
              </div>
            )}
            {title && (
              <h2 className="mt-2 text-2xl sm:text-3xl font-semibold tracking-tight text-slate-900">
                {title}
              </h2>
            )}
            <div className="mt-6">{children}</div>
          </div>
        </section>
      );

      const Card = ({ children, className }) => (
        <div className={cx("rounded-2xl border border-slate-200 bg-white p-6 shadow-sm", className)}>
          {children}
        </div>
      );

      const Pill = ({ children }) => (
        <span className="inline-flex items-center rounded-full border border-slate-200 bg-white px-3 py-1 text-xs font-medium text-slate-700">
          {children}
        </span>
      );

      const NavLink = ({ id, label, activeId }) => (
        <button
          onClick={() => scrollToId(id)}
          className={cx(
            "text-sm font-medium transition-colors",
            activeId === id ? "text-slate-900" : "text-slate-500 hover:text-slate-800"
          )}
        >
          {label}
        </button>
      );

      function App() {
        const sections = ["method", "modules", "cases", "insights", "about", "contact"];
        const activeId = useScrollSpy(sections);

        return (
          <div>
            {/* Top bar */}
            <header className="sticky top-0 z-50 border-b border-slate-200 bg-white/85 backdrop-blur">
              <div className="mx-auto max-w-6xl px-5">
                <div className="flex h-16 items-center justify-between gap-6">
                  <button
                    onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
                    className="flex items-baseline gap-2 text-left"
                    aria-label="Go to top"
                  >
                    <span className="text-sm font-semibold tracking-tight">Mantovani</span>
                    <span className="hidden sm:inline text-sm text-slate-500">Structured Legal Engineering</span>

                  <nav className="hidden md:flex items-center gap-6">
                    <NavLink id="method" label="The Method" activeId={activeId} />
                    <NavLink id="modules" label="Risk Modules" activeId={activeId} />
                    <NavLink id="cases" label="Applied Cases" activeId={activeId} />
                    <NavLink id="insights" label="Insights" activeId={activeId} />
                    <NavLink id="about" label="About" activeId={activeId} />
                    <NavLink id="contact" label="Contact" activeId={activeId} />
                  </nav>

                  <div className="flex items-center gap-3">
                    <button
                      onClick={() => scrollToId("contact")}
                      className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 transition"
                    >
                      Request a call
                    </button>
                  </div>
                </div>
              </div>
            </header>

            {/* Hero */}
            <main>
              <section className="border-b border-slate-200">
                <div className="mx-auto max-w-6xl px-5 py-16 sm:py-20">
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                    <div className="lg:col-span-7">
                      <div className="flex flex-wrap gap-2">
                        <Pill>Legal engineering</Pill>
                        <Pill>Quantitative risk</Pill>
                        <Pill>Complex tech contracts</Pill>
                      </div>

                      <h1 className="mt-6 text-4xl sm:text-5xl font-semibold tracking-tight text-slate-900">
                        From contractual language to quantified exposure.
                      </h1>

                      <p className="mt-5 text-lg text-slate-600 leading-relaxed">
                        I support corporate clients by structuring contractual risk into measurable variables,

                      </p>

                      <div className="mt-8 flex flex-wrap gap-3">
                        <button
                          onClick={() => scrollToId("method")}
                          className="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-slate-900 border border-slate-200 hover:border-slate-300 hover:bg-slate-50 transition"
                        >
                          Explore the method
                        </button>
                        <button
                          onClick={() => scrollToId("modules")}
                          className="rounded-xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800 transition"

                          View risk modules
                        </button>
                      </div>

                      <p className="mt-6 text-xs text-slate-500 leading-relaxed max-w-2xl">

                    </div>

                    <div className="lg:col-span-5">
                      <Card className="bg-slate-50 border-slate-200">

                        <div className="mt-4 space-y-3 text-sm text-slate-700 prose-tight">

                          <p><span className="font-semibold">Structural observations</span> on caps, indemnities, SLA distortions and allocation.</p>
                          <p><span className="font-semibold">Decision-ready memo</span> suitable for internal governance and stakeholder alignment.</p>
                        </div>
                        <div className="mt-6 grid grid-cols-2 gap-3">
                          <div className="rounded-xl bg-white border border-slate-200 p-4">
                            <div className="text-xs text-slate-500 uppercase tracking-wider">Focus</div>
                            <div className="mt-1 text-sm font-semibold">Tech & data</div>
                          </div>
                          <div className="rounded-xl bg-white border border-slate-200 p-4">
                            <div className="text-xs text-slate-500 uppercase tracking-wider">Output</div>
                            <div className="mt-1 text-sm font-semibold">Memo + scenarios</div>
                          </div>
                          <div className="rounded-xl bg-white border border-slate-200 p-4">
                            <div className="text-xs text-slate-500 uppercase tracking-wider">Method</div>

              {/* The Method */}

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">

                      <div className="mt-6 rounded-xl border border-slate-200 bg-slate-50 p-4">

                      <Pill>Exposure band</Pill>
                      <Pill>Sensitivity</Pill>
                      <Pill>Cap alignment</Pill>

                  </Card>

                  <Card>
                    <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Module 02</div>

                      <Pill>Penalty ceilings</Pill>

                  </Card>

                  <Card>
                    <div className="text-xs font-semibold uppercase tracking-wider text-slate-500">Module 03</div>
                    <div className="mt-2 text-lg font-semibold">IP & control allocation matrix</div>
                    <p className="mt-3 text-sm text-slate-600 leading-relaxed">
                      Ownership and control mapped across pre-existing IP, custom work, embedded software and data rights.
                    </p>
                    <div className="mt-4 flex flex-wrap gap-2">
                      <Pill>Ownership map</Pill>
                      <Pill>Control imbalance</Pill>
                      <Pill>Clause options</Pill>

                  </Card>
                </div>

                <div className="mt-6 text-sm text-slate-600">
                  These modules are not presented as self-service tools. They describe the analytical structure applied in professional mandates.
                </div>
              </Section>

              {/* Applied Cases */}
              <Section id="cases" eyebrow="Applied Cases" title="Anonymized examples of structured outputs">
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                  <Card>
                    <div className="text-sm font-semibold">Case 01 — Recurring services</div>
                    <div className="mt-2 text-sm text-slate-600">
                      Contract value: €1.2M • Duration: 36 months • Initial cap: 100%
                    </div>
                    <div className="mt-4 rounded-xl bg-slate-50 border border-slate-200 p-4 text-sm text-slate-700">
                      Modeling highlighted cumulative exposure beyond tolerance under stress conditions.
                      Recommendation: tiered cap + penalty ceiling + narrowed trigger set.
                    </div>
                  </Card>

                  <Card>
                    <div className="text-sm font-semibold">Case 02 — SLA-heavy environment</div>
                    <div className="mt-2 text-sm text-slate-600">
                      Multi-site operations • High dependency • Penalties compounding risk
                    </div>
                    <div className="mt-4 rounded-xl bg-slate-50 border border-slate-200 p-4 text-sm text-slate-700">
                      Simulation revealed disproportion between negotiated “availability” and real business impact.
                      Recommendation: redefine SLA metrics + introduce cure windows + cap cumulative penalties.
                    </div>
                  </Card>

                  <Card>
                    <div className="text-sm font-semibold">Case 03 — Embedded software & IP</div>
                    <div className="mt-2 text-sm text-slate-600">
                      Integration model • Deliverables ambiguity • Pre-existing IP at stake
                    </div>
                    <div className="mt-4 rounded-xl bg-slate-50 border border-slate-200 p-4 text-sm text-slate-700">
                      IP matrix highlighted control asymmetry and downstream licensing exposure.
                      Recommendation: explicit ownership split + embedded license terms + feedback handling.
                    </div>
                  </Card>
                </div>
              </Section>

              {/* Insights */}
              <Section id="insights" eyebrow="Insights" title="Short notes on modeling and governance" className="bg-slate-50 border-y border-slate-200">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                  <Card>
                    <div className="text-sm font-semibold">Liability caps misprice operational risk</div>
                    <p className="mt-2 text-sm text-slate-600">

                    </p>
                  </Card>
                  <Card>
                    <div className="text-sm font-semibold">Quantification as governance</div>
                    <p className="mt-2 text-sm text-slate-600">

              {/* About */}

                  <div className="lg:col-span-5">
                    <Card className="bg-slate-50">
                      <div className="text-sm font-semibold">Scope examples</div>
                      <div className="mt-3 flex flex-wrap gap-2">
